<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Elisa Quiz – Timeline Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #050510;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    h1, h2 {
      text-align: center;
    }

    .btn {
      background: #7b5cff;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 16px;
      display: inline-block;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #start-screen, #quiz-screen, #results-screen {
      display: none;
    }

    #start-screen.active,
    #quiz-screen.active,
    #results-screen.active {
      display: block;
    }

    #choices {
      margin-top: 16px;
    }

    .choice {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .choice input {
      accent-color: #7b5cff;
    }

    .choice.selected {
      border-color: #7b5cff;
      background: rgba(123, 92, 255, 0.15);
    }

    #feedback {
      margin-top: 12px;
      min-height: 24px;
      font-size: 14px;
    }

    /* Progress bar */
    #progress-bar {
      width: 100%;
      height: 8px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 16px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7b5cff, #ff6ad5);
      transition: width 0.3s ease;
    }

    /* Timeline */
    .timeline-container {
      margin-top: 16px;
      border-radius: 12px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .timeline-item {
      border: 1px solid #444;
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #111;
      cursor: grab;
      user-select: none;
    }

    .timeline-item.dragging {
      opacity: 0.6;
    }

    .timeline-item.drop-target {
      border-color: #7b5cff;
    }

    /* Results */
    #results-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }

    .pie-chart {
      width: 160px;
      height: 160px;
      margin-bottom: 12px;
    }

    .pie-chart svg {
      transform: rotate(-90deg);
    }

    .pie-chart text {
      transform: rotate(90deg);
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #f5f5f5;
      font-size: 20px;
    }

    #results-text {
      text-align: center;
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.4;
    }

    img#question-photo {
      max-width: 100%;
      border-radius: 16px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Start Screen -->
    <section id="start-screen" class="active">
      <h1>The Council Awaits</h1>
      <p style="text-align:center; margin-top:8px;">
        A small panel of extremely biased judges would like to review your memories.
      </p>
      <div style="text-align:center;">
        <button id="start-btn" class="btn">Begin</button>
      </div>
    </section>

    <!-- Quiz Screen -->
    <section id="quiz-screen">
      <img id="question-photo" alt="">
      <h2 id="question-text"></h2>
      <div id="choices"></div>
      <div id="feedback"></div>

      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>

      <button id="next-btn" class="btn" style="display:none;">Next</button>
      <button id="submit-timeline-btn" class="btn" style="display:none;">Submit Timeline</button>
    </section>

    <!-- Results Screen -->
    <section id="results-screen">
      <h2>Your Results</h2>
      <div id="results-visual"></div>
      <div id="results-text"></div>
    </section>
  </div>

  <script>
    // --- State ---
    let currentQuestionIndex = 0;
    let score = 0;

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultsScreen = document.getElementById("results-screen");

    const startBtn = document.getElementById("start-btn");
    const questionText = document.getElementById("question-text");
    const choices = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const submitTimelineBtn = document.getElementById("submit-timeline-btn");
    const progressFill = document.getElementById("progress-fill");
    const questionPhoto = document.getElementById("question-photo");
    const resultsVisual = document.getElementById("results-visual");
    const resultsText = document.getElementById("results-text");

    // --- Quiz Data (sample + your timeline as #12) ---
    const quiz = [
      {
        type: "multiple-choice",
        question: "Warm-up: which of these is most likely to make you say “absolutely not”?",
        options: [
          "A 6am spin class",
          "Camping without running water",
          "A group icebreaker where you have to share a “fun fact”",
          "A trust fall exercise with strangers"
        ],
        correctAnswer: 2
      },
      {
        type: "multiple-choice",
        question: "Which of these is closest to your ideal night?",
        options: [
          "Perfectly mixed cocktail, dim lights, jazz in the background",
          "Sweat, noise, and a band that might actually blow the speakers",
          "Board games, snacks, and a running commentary on everyone’s strategy",
          "A movie you’ve seen 10 times, but this time with better company"
        ],
        correctAnswer: 0
      },
      {
        type: "multi-select",
        question: "Click all that apply: which of these feel like “you”?",
        options: [
          "You notice the lighting in a room before the furniture",
          "You remember conversations in scenes, not bullet points",
          "You’d rather have one perfect night than ten “pretty good” ones",
          "You mentally rewrite the soundtrack of your own life"
        ],
        correctAnswers: [0, 1, 2, 3]
      },
      {
        type: "photo",
        question: "Imagine this is the opening shot of a night out. What’s the vibe?",
        photoSrc: "https://images.pexels.com/photos/2101187/pexels-photo-2101187.jpeg",
        options: [
          "We’re about to make a terrible decision in the best possible way.",
          "Someone’s going to cry, but like… cathartically.",
          "This ends with fries, no matter what.",
          "We’re staying until they kick us out."
        ],
        correctAnswer: 2
      },

      // ... you can add more questions here ...

      // Make sure this is the 12th question in the array
      {
        question: "Put these nights in the correct order — from the first spark to the latest chapter.",
        type: "timeline",
        items: [
          { id: 1, label: "Nacho Libre", date: "Jul22" },
          { id: 2, label: "Etch", date: "Jul26" },
          { id: 3, label: "My return from Dallas", date: "Aug5" },
          { id: 4, label: "Geist", date: "Aug8" },
          { id: 5, label: "Louis CK", date: "Sep1" },
          { id: 6, label: "Nine Inch Nails", date: "Sep6" },
          { id: 7, label: "Bluebird on the Mountain", date: "Sep13" },
          { id: 8, label: "1799 Kitchen (first time)", date: "Sep22" }
        ],
        correctOrder: [1, 2, 3, 4, 5, 6, 7, 8],
        perfectResponse: "The Council rises in unison — flawless sequencing, impeccable memory. You didn’t just live these nights, you archived them.",
        strongResponse: "The Council whispers, “She’s got taste, memory, and impeccable sequencing.” A few slips, but the story is intact.",
        decentResponse: "The Council adjusts their pearls — respectable recall, but some of these nights blurred together in the best possible way.",
        weakResponse: "The Council gasps dramatically — “Were you even there for these moments?” Fortunately, the Council is merciful… and also a little drunk on Malbec."
      }

      // ... and you can add more questions after this if you like ...
    ];

    const totalQuestions = quiz.length;

    // --- Core Flow ---
    startBtn.addEventListener("click", () => {
      startScreen.classList.remove("active");
      quizScreen.classList.add("active");
      currentQuestionIndex = 0;
      score = 0;
      showQuestion();
    });

    nextBtn.addEventListener("click", () => {
      if (currentQuestionIndex < quiz.length - 1) {
        currentQuestionIndex++;
        showQuestion();
      } else {
        showResults();
      }
    });

    submitTimelineBtn.addEventListener("click", () => {
      const question = quiz[currentQuestionIndex];
      const userItems = Array.from(document.querySelectorAll(".timeline-item"));
      const userOrder = userItems.map(item => Number(item.dataset.id));

      const correctOrder = question.correctOrder;
      const totalItems = correctOrder.length;

      let correctCount = 0;
      for (let i = 0; i < totalItems; i++) {
        if (userOrder[i] === correctOrder[i]) {
          correctCount++;
        }
      }

      const fraction = correctCount / totalItems;
      score += fraction; // timeline = 1 point max

      // Reveal dates in correct order
      revealTimelineAnswer(question);

      // Then move to results after a short pause
      setTimeout(showResults, 1600);
    });

    function showQuestion() {
      const question = quiz[currentQuestionIndex];
      feedback.textContent = "";
      choices.innerHTML = "";
      questionPhoto.style.display = "none";
      submitTimelineBtn.style.display = "none";
      nextBtn.style.display = "none";

      // Progress
      const progressPercent = ((currentQuestionIndex) / totalQuestions) * 100;
      progressFill.style.width = `${progressPercent}%`;

      questionText.textContent = question.question;

      if (question.type === "multiple-choice") {
        renderMultipleChoiceQuestion(question);
      } else if (question.type === "multi-select") {
        renderMultiSelectQuestion(question);
      } else if (question.type === "photo") {
        renderPhotoQuestion(question);
      } else if (question.type === "timeline") {
        renderTimelineQuestion(question);
      }
    }

    // --- Renderers ---
    function renderMultipleChoiceQuestion(question) {
      submitTimelineBtn.style.display = "none";
      nextBtn.style.display = "none";

      question.options.forEach((optionText, index) => {
        const div = document.createElement("div");
        div.classList.add("choice");

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "mc";
        input.value = index;

        const label = document.createElement("span");
        label.textContent = optionText;

        div.appendChild(input);
        div.appendChild(label);

        div.addEventListener("click", () => {
          document.querySelectorAll(".choice").forEach(c => c.classList.remove("selected"));
          div.classList.add("selected");
          input.checked = true;

          if (index === question.correctAnswer) {
            feedback.textContent = "The Council nods approvingly.";
            score += 1;
          } else {
            feedback.textContent = "The Council raises one eyebrow — interesting choice.";
          }

          nextBtn.style.display = "inline-block";
        });

        choices.appendChild(div);
      });
    }

    function renderMultiSelectQuestion(question) {
      submitTimelineBtn.style.display = "none";
      nextBtn.style.display = "none";

      question.options.forEach((optionText, index) => {
        const div = document.createElement("div");
        div.classList.add("choice");

        const input = document.createElement("input");
        input.type = "checkbox";
        input.value = index;

        const label = document.createElement("span");
        label.textContent = optionText;

        div.appendChild(input);
        div.appendChild(label);

        div.addEventListener("click", (e) => {
          if (e.target.tagName !== "INPUT") {
            input.checked = !input.checked;
          }
          div.classList.toggle("selected", input.checked);
        });

        choices.appendChild(div);
      });

      const submitBtn = document.createElement("button");
      submitBtn.textContent = "Lock it in";
      submitBtn.classList.add("btn");
      submitBtn.style.marginTop = "12px";

      submitBtn.addEventListener("click", () => {
        const selected = Array.from(document.querySelectorAll(".choice input:checked"))
          .map(input => Number(input.value))
          .sort((a, b) => a - b);

        const correct = [...question.correctAnswers].sort((a, b) => a - b);

        const isCorrect =
          selected.length === correct.length &&
          selected.every((val, idx) => val === correct[idx]);

        if (isCorrect) {
          feedback.textContent = "The Council is delighted — you understood the assignment.";
          score += 1;
        } else {
          feedback.textContent = "The Council murmurs — close, but not quite the full picture.";
        }

        submitBtn.disabled = true;
        nextBtn.style.display = "inline-block";
      });

      choices.appendChild(submitBtn);
    }

    function renderPhotoQuestion(question) {
      submitTimelineBtn.style.display = "none";
      nextBtn.style.display = "none";

      questionPhoto.src = question.photoSrc;
      questionPhoto.style.display = "block";

      question.options.forEach((optionText, index) => {
        const div = document.createElement("div");
        div.classList.add("choice");

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "photo";
        input.value = index;

        const label = document.createElement("span");
        label.textContent = optionText;

        div.appendChild(input);
        div.appendChild(label);

        div.addEventListener("click", () => {
          document.querySelectorAll(".choice").forEach(c => c.classList.remove("selected"));
          div.classList.add("selected");
          input.checked = true;

          if (index === question.correctAnswer) {
            feedback.textContent = "The Council approves of your cinematic instincts.";
            score += 1;
          } else {
            feedback.textContent = "The Council tilts their head — bold interpretation.";
          }

          nextBtn.style.display = "inline-block";
        });

        choices.appendChild(div);
      });
    }

    function renderTimelineQuestion(question) {
      choices.innerHTML = "";
      feedback.textContent = "";

      submitTimelineBtn.style.display = "inline-block";
      nextBtn.style.display = "none";

      const container = document.createElement("div");
      container.classList.add("timeline-container");

      // Shuffle items so they’re not already in order
      const shuffled = [...question.items].sort(() => Math.random() - 0.5);

      shuffled.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("timeline-item");
        div.textContent = item.label; // labels only for now
        div.dataset.id = item.id;
        container.appendChild(div);
      });

      choices.appendChild(container);
      enableDragAndDrop(container);
    }

    // --- Drag & Drop for Timeline ---
    function enableDragAndDrop(container) {
      let draggedItem = null;

      container.querySelectorAll(".timeline-item").forEach(item => {
        item.draggable = true;

        item.addEventListener("dragstart", () => {
          draggedItem = item;
          item.classList.add("dragging");
        });

        item.addEventListener("dragend", () => {
          draggedItem = null;
          item.classList.remove("dragging");
        });

        item.addEventListener("dragover", (e) => {
          e.preventDefault();
          const bounding = item.getBoundingClientRect();
          const offset = e.clientY - bounding.top;
          const shouldInsertBefore = offset < bounding.height / 2;

          if (shouldInsertBefore) {
            container.insertBefore(draggedItem, item);
          } else {
            container.insertBefore(draggedItem, item.nextSibling);
          }
        });
      });
    }

    function revealTimelineAnswer(question) {
      const container = choices.querySelector(".timeline-container");
      if (!container) return;

      container.innerHTML = "";

      question.correctOrder.forEach(id => {
        const item = question.items.find(i => i.id === id);
        const div = document.createElement("div");
        div.classList.add("timeline-item");
        div.textContent = `${item.label} — ${item.date}`;
        container.appendChild(div);
      });

      const fraction = score - Math.floor(score); // last added fraction
      if (fraction === 1) {
        feedback.textContent = question.perfectResponse;
      } else if (fraction >= 0.75) {
        feedback.textContent = question.strongResponse;
      } else if (fraction >= 0.4) {
        feedback.textContent = question.decentResponse;
      } else {
        feedback.textContent = question.weakResponse;
      }
    }

    // --- Results ---
    function showResults() {
      quizScreen.classList.remove("active");
      resultsScreen.classList.add("active");

      const maxScore = totalQuestions; // each question = 1 point max
      const percent = Math.round((score / maxScore) * 100);

      resultsVisual.innerHTML = "";
      resultsText.innerHTML = "";

      const svgNS = "http://www.w3.org/2000/svg";
      const size = 160;
      const radius = 70;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - percent / 100);

      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);

      const bgCircle = document.createElementNS(svgNS, "circle");
      bgCircle.setAttribute("cx", size / 2);
      bgCircle.setAttribute("cy", size / 2);
      bgCircle.setAttribute("r", radius);
      bgCircle.setAttribute("stroke", "#333");
      bgCircle.setAttribute("stroke-width", "14");
      bgCircle.setAttribute("fill", "none");

      const fgCircle = document.createElementNS(svgNS, "circle");
      fgCircle.setAttribute("cx", size / 2);
      fgCircle.setAttribute("cy", size / 2);
      fgCircle.setAttribute("r", radius);
      fgCircle.setAttribute("stroke", "url(#grad)");
      fgCircle.setAttribute("stroke-width", "14");
      fgCircle.setAttribute("fill", "none");
      fgCircle.setAttribute("stroke-dasharray", circumference);
      fgCircle.setAttribute("stroke-dashoffset", offset);
      fgCircle.setAttribute("stroke-linecap", "round");

      const defs = document.createElementNS(svgNS, "defs");
      const linearGradient = document.createElementNS(svgNS, "linearGradient");
      linearGradient.setAttribute("id", "grad");
      linearGradient.setAttribute("x1", "0%");
      linearGradient.setAttribute("y1", "0%");
      linearGradient.setAttribute("x2", "100%");
      linearGradient.setAttribute("y2", "0%");

      const stop1 = document.createElementNS(svgNS, "stop");
      stop1.setAttribute("offset", "0%");
      stop1.setAttribute("stop-color", "#7b5cff");

      const stop2 = document.createElementNS(svgNS, "stop");
      stop2.setAttribute("offset", "100%");
      stop2.setAttribute("stop-color", "#ff6ad5");

      linearGradient.appendChild(stop1);
      linearGradient.appendChild(stop2);
      defs.appendChild(linearGradient);

      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", size / 2);
      text.setAttribute("y", size / 2);
      text.textContent = `${percent}%`;

      svg.appendChild(defs);
      svg.appendChild(bgCircle);
      svg.appendChild(fgCircle);
      svg.appendChild(text);

      const pieWrapper = document.createElement("div");
      pieWrapper.classList.add("pie-chart");
      pieWrapper.appendChild(svg);

      resultsVisual.appendChild(pieWrapper);

      let councilLine = "";
      if (percent >= 90) {
        councilLine = "The Council is speechless. Which is rare. They’re mostly just clapping.";
      } else if (percent >= 70) {
        councilLine = "The Council is deeply impressed — a few fuzzy edges, but the story is intact.";
      } else if (percent >= 50) {
        councilLine = "The Council smiles — you were present, even if the details got a little soft around the edges.";
      } else {
        councilLine = "The Council sighs dramatically, then pours another glass. Memory is a collaborative sport anyway.";
      }

      resultsText.innerHTML = `
        You scored <strong>${score.toFixed(2)}</strong> out of <strong>${maxScore}</strong>.<br>
        ${councilLine}
      `;
    }
  </script>
</body>
</html>
