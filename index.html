<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Queen Elisa Ellen Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .app {
      max-width: 800px;
      width: 100%;
      margin: 24px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #ddd;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: #fff;
    }

    header h1 {
      margin: 0;
      font-size: 1.3rem;
      color: #333;
    }

    .progress {
      flex: 0 0 auto;
      width: 220px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4b8b, #ffb347);
      transition: width 0.25s ease-out;
    }

    .progress-text {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #666;
      text-align: right;
    }

    main {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    .screen {
      display: none;
      padding: 24px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .screen.active {
      display: block;
    }

    .start-screen h2 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #333;
    }

    .start-screen p {
      margin-top: 0;
      margin-bottom: 16px;
      color: #555;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff4b8b, #ffb347);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 75, 139, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(255, 75, 139, 0.4);
    }

    .btn-secondary {
      background: #f2f2f2;
      color: #333;
      border: 1px solid #ccc;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    .quiz-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
      border: 1px solid #ddd;
    }

    .question-text {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #222;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice {
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
      text-align: left;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
      color: #222;
    }

    .choice:hover {
      background: #ececec;
      transform: translateY(-1px);
    }

    .choice.correct {
      border-color: #4caf50;
      background: #e8f5e9;
    }

    .choice.incorrect {
      border-color: #f44336;
      background: #fdecea;
    }

    .choice input[type="checkbox"] {
      accent-color: #ff4b8b;
      width: 16px;
      height: 16px;
    }

    .feedback {
      min-height: 40px;
      font-size: 0.95rem;
      color: #444;
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 12px;
    }

    .emoji-strip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 1.2rem;
      opacity: 0.9;
      background: #fff url("EmojisforQuiz.jpg") center/cover no-repeat;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #ddd;
    }

    .results-screen h2 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #333;
    }

    .result-photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
      border: 1px solid #ddd;
    }

    .results-text {
      margin-bottom: 16px;
      color: #444;
    }

    @media (max-width: 600px) {
      .app {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress {
        width: 100%;
      }
    }
  </style>
</head>

    </main>
  </div>
