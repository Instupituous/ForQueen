<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Queen Elisa Ellen Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .app {
      max-width: 800px;
      width: 100%;
      margin: 24px;
      background: #1b1b1f;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    .progress {
      flex: 0 0 auto;
      width: 220px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4b8b, #ffb347);
      transition: width 0.25s ease-out;
    }

    .progress-text {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #aaa;
      text-align: right;
    }

    main {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen {
      display: none;
      padding: 24px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    .screen.active {
      display: block;
    }

    .start-screen h2 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .start-screen p {
      margin-top: 0;
      margin-bottom: 16px;
      color: #ccc;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff4b8b, #ffb347);
      color: #111;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.5);
    }

    .btn-secondary {
      background: #2a2a30;
      color: #f5f5f5;
      border: 1px solid #444;
    }

    .btn-secondary:hover {
      background: #34343b;
    }

    .quiz-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .question-text {
      font-size: 1.05rem;
      margin-bottom: 12px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice {
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #333;
      background: #222228;
      cursor: pointer;
      text-align: left;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }

    .choice:hover {
      background: #2b2b33;
      transform: translateY(-1px);
    }

    .choice.correct {
      border-color: #4caf50;
      background: #1f3321;
    }

    .choice.incorrect {
      border-color: #f44336;
      background: #3a1f1f;
    }

    .choice input[type="checkbox"] {
      accent-color: #ff4b8b;
      width: 16px;
      height: 16px;
    }

    .feedback {
      min-height: 40px;
      font-size: 0.9rem;
      color: #f0d0ff;
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 12px;
    }

    .emoji-strip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 1.2rem;
      opacity: 0.9;
      background: #18181c url("EmojisforQuiz.jpg") center/cover no-repeat;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .results-screen h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .result-photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .results-text {
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .app {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Queen Elisa Ellen: Classy Broad Quiz</h1>
      <div class="progress">
        <div class="progress-bar-bg">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
        <div id="progress-text" class="progress-text">Progress: 0%</div>
      </div>
    </header>

    <main>
      <!-- Start Screen -->
      <section id="start-screen" class="screen start-screen active">
        <h2>Welcome, Mortal.</h2>
        <p>
          You are about to be tested on your knowledge of Queen Elisa Ellen — her chaos, her class, her lore.
        </p>
        <button id="start-btn" class="btn btn-primary">Begin the Trial</button>
      </section>

      <!-- Quiz Screen -->
      <section id="quiz-screen" class="screen quiz-screen">
        <img id="question-photo" class="question-photo" alt="Question photo" />
        <div id="question-text" class="question-text"></div>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback"></div>

        <div class="quiz-footer">
          <div class="emoji-strip">
            <span>💅</span><span>👑</span><span>🍷</span><span>✨</span>
          </div>
          <button id="next-btn" class="btn btn-secondary" style="display:none;">Next</button>
        </div>
      </section>

      <!-- Results Screen -->
      <section id="results-screen" class="screen results-screen">
        <h2>Verdict from the Council</h2>
        <img id="result-photo" class="result-photo" alt="Result photo" />
        <div id="score-text" class="results-text"></div>
        <button id="restart-btn" class="btn btn-primary">Try Again</button>
      </section>
    </main>
  </div>

  <script>
    /* ⭐ QUIZ DATA */
    const quiz = [

      {
        question: "What the heck does this guy want from Elisa Ellen, anyway?",
        photo: "MeinxmasChair.jpg",
        choices: [
          "Nothing",
          "Can I buy a vowel?",
          "Selfless Partnership",
          "1.21 gigawatts"
        ],
        answerIndex: 2,
        correctResponse: "Correct. The Council beams with approval — selfless partnership is the only acceptable answer.",
        incorrectResponse: "Incorrect. The Council squints at the photo, then at you, then back at the photo. Try again, mortal."
      },

      {
        question: "What is Elisa most likely to be doing when she enters her full Classy Broad form?",
        choices: ["Sipping wine", "Fixing her hair", "Giving a side-eye", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. The Council of Classy Broads rises as Queen Elisa Ellen ascends.",
        incorrectResponse: "Incorrect. The Council tilts its head in confusion, Elisa Ellen Mineck expected better."
      },

      {
        question: "When she claims to be both an Iowa Hawkeyes fan and an Iowa State Cyclones fan during March Madness, what does that actually make her?",
        photo: "IowaLogos.jpg",
        choices: [
          "A well-meaning spectator who just wants everyone to have a nice tournament",
          "A diplomatic visionary attempting to unify a divided state",
          "Someone trying to argue both sides of the case and hoping the judge won't notice",
          "A full-blown walking contradiction under NCAA law"
        ],
        answerIndex: 3,
        correctResponse: "Correct. A contradiction of such magnitude it could power a small Midwestern town.",
        incorrectResponse: "Incorrect. The Council of Classy Broads lowers their readers in unison, deeply unimpressed by your reasoning."
      },

      {
        question: "What is Elisa's signature classy move?",
        choices: ["The hair tuck", "The knowing smirk", "The elegant eye roll", "The 'I'm not mad, just disappointed'"],
        answerIndex: 1,
        correctResponse: "Correct. The smirk that could launch a thousand ships.",
        incorrectResponse: "Incorrect. The Council smirks at YOU now."
      },

      {
        question: "What drink transforms her into her final form?",
        choices: ["Malbec", "Champagne", "Old Fashioned", "Espresso martini"],
        answerIndex: 0,
        correctResponse: "Correct. Malbec unlocks the Baller Queen.",
        incorrectResponse: "Incorrect. The Council swirls a glass of Malbec in judgment."
      },

      {
        question: "Who is this dashing gentleman?",
        photo: "NeilFallon.jpg",
        choices: [
          "Ragnar O'Sealegs, pirate laureate of questionable ballads",
          "Grunk the Unwashed, inventor of yelling",
          "Ye Ole Mossbeard, keeper of the forest's damp secrets",
          "Neil Fallon of Clutch, prophet of riff-driven wisdom"
        ],
        answerIndex: 3,
        correctResponse: "Correct. The Earth's rotation stabilizes; the Riff Prophets smile upon your wisdom.",
        incorrectResponse: "Incorrect. A cosmic blues riff fades out in disappointment. Try again."
      },

      {
        question: "What is Elisa's preferred level of chaos?",
        choices: ["Low", "Medium", "High", "Elegant chaos only"],
        answerIndex: 3,
        correctResponse: "Correct. She is chaos, but make it couture.",
        incorrectResponse: "Incorrect. The Council adjusts its pearls in disapproval."
      },

      {
        question: "Which of these best describes her laugh?",
        choices: ["Cute giggle", "Full-body laugh", "Silent wheeze", "The 'I can't breathe' laugh"],
        answerIndex: 1,
        correctResponse: "Correct. The laugh that could end wars.",
        incorrectResponse: "Incorrect. The Council demands you study and know thyself."
      },

      {
        question: "What is her most powerful weapon?",
        choices: ["Her smile", "Her confidence", "Her sarcasm", "Her entire existence"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a full arsenal.",
        incorrectResponse: "Incorrect. The Council sighs, 'Her power is limitless.'"
      },

      {
        question: "Which of these is she most likely to say?",
        choices: ["'I'm fine.'", "'NOPE!'", "'You're ridiculous.'", "'Both And.'"],
        answerIndex: 1,
        correctResponse: "Correct. Do not even try it.",
        incorrectResponse: "Incorrect. The Council mutters, 'This was a gimme.'"
      },

      {
        question: "Scientists have several theories about why celiac disease rates are rising. Which of the following are actually believed to contribute? (Check all that apply)",
        choices: [
          "Better awareness and improved testing",
          "Gluten becoming sentient and holding a grudge",
          "Environmental factors",
          "Changes in gut microbiomes"
        ],
        correctAnswers: [0, 2, 3],
        responses: {
          "0,2,3": "Correct. A masterclass in gluten-free wisdom — you navigate this world with the grace of someone who's read every label from here to Omaha.",
          "0,2": "So close. Still, your instincts are sharp enough to impress even the most seasoned gluten-free veterans.",
          "0,3": "Nearly there. Your gluten-detective skills remain top-tier, even when one clue slips by.",
          "2,3": "A strong showing — truly. You reason like someone who has survived years of gluten-free snack negotiations.",
          "3,2": "A strong showing — truly. You reason like someone who has survived years of gluten-free snack negotiations.",
          "0": "Incorrect, but admirable. You're thinking like a mom who can spot hidden gluten from across a crowded room.",
          "2": "Incorrect, but the confidence is inspiring. You carry yourself like someone who has conquered the gluten-free birthday party circuit.",
          "3": "Incorrect, but honestly? The intuition is impressive. You radiate the energy of someone who has stared down many a suspicious ingredient list.",
          "0,1,2,3": "Incorrect — but the ambition is breathtaking. You answered like a woman who refuses to be intimidated by gluten, science, or chaos.",
          "1": "Incorrect. Hilarious, but incorrect. Still, the imagination on display deserves a gluten-free medal.",
          "0,1": "Incorrect — but the creativity is undeniable. You navigate this like someone who has mastered both humor and hidden-gluten reconnaissance.",
          "1,2": "Incorrect — but the creativity is undeniable. You navigate this like someone who has mastered both humor and hidden-gluten reconnaissance.",
          "1,3": "Incorrect — but the creativity is undeniable. You navigate this like someone who has mastered both humor and hidden-gluten reconnaissance.",
          "1,2,3": "Incorrect — but the creativity is undeniable. You navigate this like someone who has mastered both humor and hidden-gluten reconnaissance."
        }
      },

      {
        question: "What is The Queen's hidden superpower?",
        choices: ["Reading people instantly", "Looking flawless effortlessly", "Making you laugh", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a multi-class hero.",
        incorrectResponse: "Incorrect. The Council chuckles knowingly."
      },

      {
        question: "Her style leans toward which of the following?",
        choices: [
          "Traditional — lace, rituals, and the approval of ancestors",
          "Modern — sleek, efficient, and probably involving an app",
          "A perfect blend of old-school charm and new-school convenience",
          "Whatever option requires the least ironing"
        ],
        answerIndex: 3,
        correctResponse: "Correct. A choice as refined as it is revealing — well played.",
        incorrectResponse: "Incorrect. A bold guess, but not the vibe we were looking for."
      },

      {
        question: "What is her go-to move when she's unimpressed?",
        choices: ["The eyebrow raise", "The slow blink", "The head tilt", "The 'really?' face"],
        answerIndex: 3,
        correctResponse: "Correct. If looks could kill.",
        incorrectResponse: "Incorrect. The Council raises its collective eyebrow at YOU."
      },

      {
        question: "Across all the places she lived — Cedar Rapids, Indianapolis, Canton, San Diego, and Nashville — what's one thing they almost all have in common when it comes to college sports?",
        choices: [
          "All are home to legendary NCAA powerhouses that dominate national championships",
          "Most of her cities are NCAA towns, but one proudly flies the NAIA flag",
          "Every city she lived in has a mascot that looks like it hasn't slept since 1978",
          "Each stop on her journey is united by fierce rivalries in the mythical Interstate Corn Belt Classic"
        ],
        answerIndex: 1,
        correctResponse: "Correct. Most of her cities roll with NCAA muscle, but Canton stands there in its NAIA overalls, smiling stubbornly.",
        incorrectResponse: "Incorrect. The Council of Classy Broads channels their inner space-wizard: 'This is not the pattern you are looking for.'"
      },

      {
        question: "Which of the following did NOT happen on March 27, 1973 — the day Queen Elisa Ellen arrived?",
        choices: [
          "Marlon Brando refused his Oscar, sending Sacheen Littlefeather in his place",
          "Captain Floyd J. Thompson — longest-held Vietnam POW — was released",
          "UCLA won the NCAA title behind Bill Walton's 44-point game",
          "Queen Elizabeth II opened the new London Bridge"
        ],
        answerIndex: 2,
        correctResponse: "Correct. The Council applauds your precision — Walton's 44-point rampage happened on March 26, not the 27th.",
        incorrectResponse: "Incorrect. The Council exchanges a slow, disappointed side-eye that could curdle milk."
      },

      {
        question: "The Council presents Exhibit A. After which of our escapades was this message sent?",
        photo: "TextPostEtch.jpg",
        choices: [
          "Following our date at Etch",
          "Following our Nacho Libre date",
          "Following our Geist date",
          "Following my return from Baumann's"
        ],
        answerIndex: 0,
        correctResponse: "Correct. The Council nods — Etch was the spark behind that message.",
        incorrectResponse: "Incorrect. The Council arches a brow. 'Wow... guess that moment didn't mean much to you.'"
      },

      {
        question: "Who is in this photo?",
        photo: "JuliaPlotting.jpg",
        choices: [
          "An evil succubus mischievously plotting to steal your soul",
          "The person who steals Steve's Titans seat whenever Elisa decides the stadium needs better energy",
          "Your wonderful, supportive, and loving daughter Julia",
          "A creature who haunts youth sports fields demanding gluten-free options that never exist"
        ],
        answerIndex: 2,
        correctResponse: "Correct! Julia is the star of the show — even in shadow form.",
        incorrectResponse: "Incorrect! But honestly, with this photo, any of those answers felt possible."
      },

      {
        question: "What is her vibe when she dresses up?",
        choices: ["Elegant", "Full-On Classy Broad", "Untouchable", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. She becomes the final boss.",
        incorrectResponse: "Incorrect. The Council adjusts her crown for her."
      },

      {
        question: "What is her preferred way to win an argument?",
        choices: ["Logic", "Sarcasm", "Being right", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Mineck wins by existing.",
        incorrectResponse: "Incorrect. The Council rules in her favor anyway."
      },

      {
        question: "What is the correct title for Elisa at the end of this quiz?",
        choices: ["Queen Elisa", "Elisa Ellen the Classy Broad", "Baller Queen Mineck", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Bow before her.",
        incorrectResponse: "Incorrect. The Council gasps dramatically."
      }

    ];

    /* ⭐ STATE */
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    /* ⭐ DOM ELEMENTS */
    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultsScreen = document.getElementById("results-screen");

    const quizContainer = quizScreen;
    const questionText = document.getElementById("question-text");
    const questionPhoto = document.getElementById("question-photo");
    const choicesContainer = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");

    const scoreText = document.getElementById("score-text");
    const resultPhoto = document.getElementById("result-photo");

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");

    /* ⭐ START QUIZ */
    document.getElementById("start-btn").addEventListener("click", () => {
      startScreen.classList.remove("active");

      setTimeout(() => {
        quizScreen.classList.add("active");
        showQuestion();
      }, 50);
    });

    /* ⭐ RESTART QUIZ */
    document.getElementById("restart-btn").addEventListener("click", () => {
      location.reload();
    });

    /* ⭐ RENDER CHOICES */
    function renderChoices(q) {
      choicesContainer.innerHTML = "";
      feedback.textContent = "";
      hasAnswered = false;

      const isMulti = Array.isArray(q.correctAnswers);

      if (isMulti) {
        q.choices.forEach((choiceText, index) => {
          const choiceDiv = document.createElement("label");
          choiceDiv.className = "choice";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = index;

          const span = document.createElement("span");
          span.textContent = choiceText;

          choiceDiv.appendChild(checkbox);
          choiceDiv.appendChild(span);
          choicesContainer.appendChild(choiceDiv);
        });

        nextBtn.textContent = "Submit";
        nextBtn.style.display = "block";

        // Clean old handlers
        const newNext = nextBtn.cloneNode(true);
        nextBtn.parentNode.replaceChild(newNext, nextBtn);

        newNext.addEventListener("click", () => {
          handleMultiSelect(q);
        });
      } else {
        q.choices.forEach((choiceText, index) => {
          const choiceDiv = document.createElement("button");
          choiceDiv.className = "choice";
          choiceDiv.textContent = choiceText;

          choiceDiv.addEventListener("click", () => handleAnswer(index));
          choicesContainer.appendChild(choiceDiv);
        });

        nextBtn.style.display = "none";
      }
    }

    /* ⭐ MULTI-SELECT HANDLER */
    function handleMultiSelect(q) {
      if (hasAnswered) return;
      hasAnswered = true;

      const selected = Array.from(
        document.querySelectorAll("#choices input[type='checkbox']:checked")
      ).map(cb => parseInt(cb.value));

      const key = selected.sort((a, b) => a - b).join(",");
      const response = q.responses[key] || "Interesting choice.";

      feedback.textContent = response;

      // Score only if perfect match
      if (Array.isArray(q.correctAnswers)) {
        const correctKey = q.correctAnswers.slice().sort((a, b) => a - b).join(",");
        if (key === correctKey) {
          score++;
        }
      }

      nextBtn.textContent =
        currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";

      const newNext = nextBtn.cloneNode(true);
      nextBtn.parentNode.replaceChild(newNext, nextBtn);

      newNext.addEventListener("click", () => {
        if (currentQuestionIndex < quiz.length - 1) {
          currentQuestionIndex++;
          showQuestion();
        } else {
          showResults();
        }
      });

      newNext.style.display = "block";
    }

    /* ⭐ DISPLAY QUESTION */
    function showQuestion() {
      hasAnswered = false;
      feedback.textContent = "";

      quizContainer.scrollTop = 0;
      void quizContainer.offsetHeight;

      nextBtn.style.display = "none";
      choicesContainer.innerHTML = "";

      const q = quiz[currentQuestionIndex];
      const questionNumber = currentQuestionIndex + 1;

      questionText.textContent = `${questionNumber}. ${q.question}`;

      if (q.photo) {
        questionPhoto.src = q.photo;
        questionPhoto.style.display = "block";
      } else {
        questionPhoto.style.display = "none";
      }

      const progressPercent = Math.round((questionNumber / quiz.length) * 100);
      progressBar.style.width = progressPercent + "%";
      progressText.textContent = `Progress: ${progressPercent}%`;

      renderChoices(q);
    }

    /* ⭐ SINGLE-CHOICE HANDLER */
    function handleAnswer(selectedIndex) {
      if (hasAnswered) return;
      hasAnswered = true;

      const q = quiz[currentQuestionIndex];
      const choiceButtons = Array.from(document.getElementsByClassName("choice"));

      choiceButtons.forEach((btn, index) => {
        if (index === q.answerIndex) {
          btn.classList.add("correct");
        }
        if (index === selectedIndex && index !== q.answerIndex) {
          btn.classList.add("incorrect");
        }
        btn.disabled = true;
      });

      if (selectedIndex === q.answerIndex) {
        score++;
        feedback.textContent = q.correctResponse;
      } else {
        feedback.textContent = q.incorrectResponse;
      }

      nextBtn.textContent =
        currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";

      const newNext = nextBtn.cloneNode(true);
      nextBtn.parentNode.replaceChild(newNext, nextBtn);

      newNext.addEventListener("click", () => {
        if (currentQuestionIndex < quiz.length - 1) {
          currentQuestionIndex++;
          showQuestion();
        } else {
          showResults();
        }
      });

      newNext.style.display = "block";
    }

    /* ⭐ RESULTS */
    function showResults() {
      quizScreen.classList.remove("active");
      resultsScreen.classList.add("active");

      scoreText.textContent = `You scored ${score} out of ${quiz.length}. `;

      if (score === quiz.length) {
        scoreText.textContent += "Flawless. Queen Elisa Ellen approves.";
      } else if (score > quiz.length * 0.7) {
        scoreText.textContent += "Strong showing. The Council nods respectfully.";
      } else {
        scoreText.textContent += "The Council gasps dramatically.";
      }

      // Optional: show a final image if you want
      // resultPhoto.src = "SomeFinalImage.jpg";
      // resultPhoto.style.display = "block";
    }
  </script>
</body>
</html>
